version: '3.8'

services:
  # Oracle Database Service
  oracle:
    image: gvenzl/oracle-xe:latest
    container_name: comped-oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      ORACLE_CHARSET: AL32UTF8
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d
    networks:
      - comped-network
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/${ORACLE_PASSWORD}@localhost:1521/xe", "as sysdba", "@?/rdbms/admin/sqlnet.fna"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comped-app
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-staging}
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SPRING_FLYWAY_BASELINEONMIGRATE: ${FLYWAY_BASELINE:-true}
      MINHA_CHAVE_SECRETA: ${JWT_SECRET}
      LOGGING_LEVEL_BR_COM_FIAP_COMPED: ${LOG_LEVEL:-INFO}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - comped-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  oracle_data:

networks:
  comped-network:
    driver: bridge
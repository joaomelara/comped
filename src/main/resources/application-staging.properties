# ========================================
# STAGING Environment Configuration
# ========================================

# Application Name
spring.application.name=comped-staging

# ========================================
# Database Configuration (Staging)
# ========================================
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@oracle-staging.fiap.com.br:1521:ORCL}
spring.datasource.username=${DB_USERNAME:RM560480}
spring.datasource.password=${DB_PASSWORD:260504}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3

# JPA/Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:RM560480}
spring.jpa.hibernate.ddl-auto=validate

# Flyway Configuration
spring.flyway.baselineOnMigrate=true

# Logging Configuration
logging.level.root=INFO
logging.level.br.com.fiap.comped=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG

# Security Configuration
minha.chave.secreta=${JWT_SECRET:meusegredo123}

# Server Configuration
server.port=8080
server.servlet.context-path=/api



